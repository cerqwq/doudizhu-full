<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }
        
        input::placeholder {
            color: #666;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,71,87,0.3);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: rgba(67,233,123,0.2);
            color: #43e97b;
            border: 1px solid rgba(67,233,123,0.3);
            display: block;
        }
        
        .message.error {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
            border: 1px solid rgba(255,71,87,0.3);
            display: block;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #ccc;
        }
        
        .admin-icon {
            text-align: center;
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-icon">🔒</div>
        <h1>管理员登录</h1>
        <p class="subtitle">请输入管理员账号和密码</p>
        
        <div class="form-group">
            <label>管理员账号</label>
            <input type="text" id="username" placeholder="请输入管理员账号" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        
        <button class="login-btn" onclick="adminLogin()">登 录</button>
        
        <div class="message" id="message"></div>
        
        <a href="/nav" class="back-link">← 返回导航页</a>
    </div>
    
    <script>
        function showMessage(text, isSuccess) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message';
            msg.classList.add(isSuccess ? 'success' : 'error');
            msg.style.display = 'block';
        }
        
        function adminLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('请输入管理员账号和密码！', false);
                return;
            }
            
            fetch('/api/admin_login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                showMessage(data.message, data.success);
                if (data.success) {
                    setTimeout(function() {
                        window.location.href = '/admin';
                    }, 1000);
                }
            })
            .catch(error => {
                showMessage('网络错误，请稍后重试！', false);
            });
        }
        
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                adminLogin();
            }
        });
    </script>
</body>
</html>
