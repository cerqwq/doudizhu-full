<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联机大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #ffd700; margin-bottom: 30px; font-size: 28px; }
        .create-room {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .create-room h2 { color: #43e97b; margin-bottom: 20px; }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-create { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #0a4a2a; }
        .btn-join { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-back {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
            text-decoration: none;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 20px;
        }
        .join-room {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .join-room h2 { color: #667eea; margin-bottom: 20px; }
        input {
            padding: 12px 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            width: 200px;
            font-family: inherit;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; background: rgba(255,255,255,0.1); }
        input::placeholder { letter-spacing: 1px; font-size: 14px; }
        .input-group { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .room-code-display {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 10px;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .waiting-players { margin-top: 20px; }
        .player-list { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .player-item {
            background: rgba(255,255,255,0.08);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 120px;
        }
        .player-item .avatar { font-size: 32px; margin-bottom: 8px; }
        .player-item .name { font-size: 14px; color: #ccc; }
        .player-item .host-badge { font-size: 11px; color: #ffd700; margin-top: 5px; }
        .hidden { display: none; }
        .status-text { color: #888; font-size: 14px; margin-top: 15px; }
        .btn-start {
            background: linear-gradient(135deg, #ff6b35, #ff4444);
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 联机大厅</h1>
        
        <div class="create-room" id="createRoomSection">
            <h2>🏠 创建房间</h2>
            <p style="color:#888;margin-bottom:20px;">创建一个新房间，邀请好友一起玩</p>
            <button class="btn btn-create" onclick="createRoom()">创建房间</button>
        </div>
        
        <div class="join-room" id="joinRoomSection">
            <h2>🔑 加入房间</h2>
            <p style="color:#888;margin-bottom:20px;">输入好友的房间码加入游戏</p>
            <div class="input-group">
                <input type="text" id="roomCodeInput" placeholder="输入房间码" maxlength="6" 
                       oninput="this.value = this.value.toUpperCase()">
                <button class="btn btn-join" onclick="joinRoom()">加入</button>
            </div>
        </div>
        
        <div class="create-room hidden" id="waitingRoomSection">
            <h2>🕐 等待玩家加入</h2>
            <p style="color:#888;">分享房间码给好友：</p>
            <div class="room-code-display" id="roomCodeDisplay">------</div>
            <div class="waiting-players">
                <p style="color:#888;font-size:14px;">当前玩家：</p>
                <div class="player-list" id="playerList"></div>
            </div>
            <p class="status-text" id="waitingStatus">等待其他玩家加入...</p>
            <button class="btn btn-start" id="startGameBtn" onclick="startGame()" style="display:none;">
                🎮 进入游戏
            </button>
        </div>
        
        <div style="text-align:center;margin-top:30px;">
            <a href="/nav" class="btn-back">← 返回导航</a>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = null;
        let isHost = false;
        let isJoining = false;
        let isStarting = false;
        
        function getUsername() {
            return document.getElementById('usernameDisplay')?.textContent || '玩家';
        }
        
        function createRoom() {
            if (isJoining) return;
            isJoining = true;
            
            const username = getUsername();
            socket.emit('create_room', { username: username });
            
            setTimeout(() => { isJoining = false; }, 3000);
        }
        
        function joinRoom() {
            if (isJoining) return;
            
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (roomCode.length < 4) {
                alert('请输入有效的房间码');
                return;
            }
            
            isJoining = true;
            const username = getUsername();
            socket.emit('join_room', { 
                room_code: roomCode, 
                username: username 
            });
            
            setTimeout(() => { isJoining = false; }, 3000);
        }
        
        function startGame() {
            if (isStarting || !currentRoom) return;
            isStarting = true;
            
            // 跳转到游戏页面
            window.location.href = '/doudizhu_online?room=' + currentRoom;
            
            setTimeout(() => { isStarting = false; }, 3000);
        }
        
        socket.on('room_created', function(data) {
            currentRoom = data.room_code;
            isHost = true;
            
            document.getElementById('createRoomSection').classList.add('hidden');
            document.getElementById('joinRoomSection').classList.add('hidden');
            document.getElementById('waitingRoomSection').classList.remove('hidden');
            
            document.getElementById('roomCodeDisplay').textContent = data.room_code;
            updatePlayerList(data.players);
            
            document.getElementById('startGameBtn').style.display = 'inline-block';
            document.getElementById('startGameBtn').textContent = '🎮 进入游戏';
        });
        
        socket.on('player_joined', function(data) {
            updatePlayerList(data.players);
            
            // 如果不是房主，也显示进入游戏按钮
            if (!isHost && currentRoom) {
                document.getElementById('startGameBtn').style.display = 'inline-block';
                document.getElementById('startGameBtn').textContent = '🎮 进入游戏';
            }
        });
        
        socket.on('player_left', function(data) {
            // 刷新玩家列表
        });
        
        socket.on('error', function(data) {
            alert(data.message);
            isJoining = false;
        });
        
        function updatePlayerList(players) {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            
            players.forEach((player, index) => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `
                    <div class="avatar">${index === 0 ? '👑' : '👤'}</div>
                    <div class="name">${player.username}</div>
                    ${index === 0 ? '<div class="host-badge">房主</div>' : ''}
                `;
                list.appendChild(div);
            });
            
            const status = document.getElementById('waitingStatus');
            if (players.length >= 2) {
                status.textContent = `已有 ${players.length}/3 名玩家`;
                if (players.length === 3) {
                    status.textContent = '✅ 玩家已满，点击「进入游戏」开始准备！';
                }
            } else {
                status.textContent = '等待其他玩家加入...';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/get_user_data')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const hidden = document.createElement('span');
                        hidden.id = 'usernameDisplay';
                        hidden.style.display = 'none';
                        hidden.textContent = data.data.username;
                        document.body.appendChild(hidden);
                    }
                });
        });
    </script>
</body>
</html>
